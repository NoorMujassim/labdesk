    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="black.png">
    <link rel="apple-touch-icon" href="black.png">

    <!-- SEO Meta Tags -->
    <title>CUREBIT - Professional Blood Lab Test Report Software | Dashboard</title>
    <meta name="description"
        content="CUREBIT dashboard - Generate professional blood lab test reports with 200+ templates. Manage patients, print hospital-grade reports. Free cloud-based lab management software.">
    <meta name="keywords"
        content="lab report software, blood test report, pathology lab software, lab management system, CBC report, LFT report, KFT report, thyroid test, diagnostic center software">
    <meta name="author" content="CUREBIT">
    <meta name="robots" content="noindex, nofollow">
    <meta name="theme-color" content="#4f46e5">

    <!-- Open Graph -->
    <meta property="og:title" content="CUREBIT - Lab Management Dashboard">
    <meta property="og:description"
        content="Professional blood lab test report software. 200+ test templates, patient management, cloud storage.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://curebit.umbrellainfo.space/app.html">

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="black.png">
    <link rel="manifest" href="manifest.json">
    <link rel="canonical" href="https://curebit.umbrellainfo.space/app.html">

    <!-- Google Analytics -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-EMBYS1CSGJ"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag() { dataLayer.push(arguments); }
        gtag('js', new Date());
        gtag('config', 'G-EMBYS1CSGJ');
    </script>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="css/style.css?v=3.0">
</head>

<body>

    <!-- Auth Screen (Login/Signup) -->
    <div id="authScreen" class="auth-screen">
        <div class="auth-particles">
            <div class="auth-particle"></div>
            <div class="auth-particle"></div>
            <div class="auth-particle"></div>
            <div class="auth-particle"></div>
            <div class="auth-particle"></div>
            <div class="auth-particle"></div>
            <div class="auth-particle"></div>
            <div class="auth-particle"></div>
        </div>
        <div id="authContainer" class="auth-container"></div>
    </div>

    <!-- Main App (hidden until logged in) -->
    <div id="app" class="hidden">
        <!-- Mobile Overlay -->
        <div id="mobileOverlay" class="mobile-overlay hidden" onclick="toggleMobile()"></div>

        <!-- Sidebar -->
        <aside id="sidebar" class="sidebar">
            <div class="sidebar-header">
                <a href="#" class="brand-container" onclick="showPage('dashboard')">
                    <div class="logo-wrapper">
                        <img src="white.png" alt="CureBIT Logo" class="brand-logo">
                    </div>
                </a>
            </div>
            <nav class="sidebar-nav" id="sidebarNav"></nav>
            <div class="sidebar-footer">
                <div id="userInfo" class="user-info"></div>
                <button onclick="toggleSidebar()" class="collapse-btn">
                    <svg id="collapseIcon" class="collapse-icon" width="20" height="20" fill="none"
                        stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8"
                            d="M11 19l-7-7 7-7m8 14l-7-7 7-7" />
                    </svg>
                    <span class="sidebar-footer-text">Collapse</span>
                </button>
            </div>
        </aside>

        <!-- Main Content -->
        <main id="mainContent" class="main-content">
            <!-- Top Bar -->
            <header class="topbar">
                <div class="topbar-left">
                    <button onclick="toggleMobile()" class="mobile-menu-btn">
                        <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M4 6h16M4 12h16M4 18h16" />
                        </svg>
                    </button>
                    <div>
                        <h2 id="pageTitle" class="topbar-title">Dashboard</h2>
                        <p id="pageSubtitle" class="topbar-subtitle">Welcome to CUREBIT</p>
                    </div>
                </div>
                <div class="topbar-right">
                    <span id="labNameHeader" class="lab-name-badge hidden"></span>
                    <button id="headerNewReportBtn" onclick="showPage('newReport')" class="btn btn-primary btn-sm">
                        <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4" />
                        </svg>
                        <span class="hide-mobile">New Report</span>
                    </button>
                    <button onclick="handleLogout()" class="btn btn-outline btn-sm" title="Logout">
                        <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
                        </svg>
                        <span class="hide-mobile">Logout</span>
                    </button>
                </div>
            </header>

            <!-- Loading Overlay -->
            <div id="loadingOverlay" class="loading-overlay hidden">
                <div class="loader-spinner"></div>
                <p class="text-sm text-gray-500" style="margin-top:12px;">Loading...</p>
            </div>

            <!-- Page Container -->
            <div id="pageContainer" class="page-container fade-in"></div>
        </main>
    </div>

    <!-- Print Area -->
    <div id="printArea" class="hidden"></div>
    <!-- Modal Container -->
    <div id="modalContainer" class="hidden"></div>
    <!-- Toast Container -->
    <div id="toastContainer"></div>

    <!-- Firebase SDK v9 Compat -->
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-storage-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-analytics-compat.js"></script>

    <!-- App Scripts -->
    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
    <script src="js/firebase-config.js?v=33.0"></script>
    <script src="js/cloudinaryService.js?v=33.0"></script>
    <script src="js/db.js?v=33.0"></script>
    <script src="js/templates.js?v=33.0"></script>
    <script src="js/utils.js?v=33.0"></script>
    <script src="js/auth.js?v=33.0"></script>
    <script src="js/dashboard.js?v=33.0"></script>
    <script src="js/patients.js?v=33.0"></script>
    <script src="js/newReport.js?v=33.0"></script>
    <script src="js/reports.js?v=33.0"></script>
    <script src="js/settings.js?v=33.0"></script>
    <script src="js/profile.js?v=33.0"></script>
    <script src="js/workerClient.js?v=33.0"></script>
    <script src="js/subscription.js?v=33.0"></script>
    <script src="js/app.js?v=33.0"></script>

</body>

</html>
