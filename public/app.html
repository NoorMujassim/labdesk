<body>

    <!-- Auth Screen (Login/Signup) -->
    <div id="authScreen" class="auth-screen">
        <div class="auth-particles">
            <div class="auth-particle"></div>
            <div class="auth-particle"></div>
            <div class="auth-particle"></div>
            <div class="auth-particle"></div>
            <div class="auth-particle"></div>
            <div class="auth-particle"></div>
            <div class="auth-particle"></div>
            <div class="auth-particle"></div>
        </div>
        <div id="authContainer" class="auth-container"></div>
    </div>

    <!-- Main App (hidden until logged in) -->
    <div id="app" class="hidden">
        <!-- Mobile Overlay -->
        <div id="mobileOverlay" class="mobile-overlay hidden" onclick="toggleMobile()"></div>

        <!-- Sidebar -->
        <aside id="sidebar" class="sidebar">
            <div class="sidebar-header">
                <div class="sidebar-logo-icon">
                    <svg width="24" height="24" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M19.428 15.428a2 2 0 00-1.022-.547l-2.387-.477a6 6 0 00-3.86.517l-.318.158a6 6 0 01-3.86.517L6.05 15.21a2 2 0 00-1.806.547M8 4h8l-1 1v5.172a2 2 0 00.586 1.414l5 5c1.26 1.26.367 3.414-1.415 3.414H4.828c-1.782 0-2.674-2.154-1.414-3.414l5-5A2 2 0 009 10.172V5L8 4z" />
                    </svg>
                </div>
                <div class="logo-text">
                    <h1 class="sidebar-title">LabDesk</h1>
                    <p class="sidebar-subtitle">Lab Management</p>
                </div>
            </div>
            <nav class="sidebar-nav" id="sidebarNav"></nav>
            <div class="sidebar-footer">
                <div id="userInfo" class="user-info"></div>
                <button onclick="toggleSidebar()" class="collapse-btn">
                    <svg id="collapseIcon" class="collapse-icon" width="20" height="20" fill="none"
                        stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8"
                            d="M11 19l-7-7 7-7m8 14l-7-7 7-7" />
                    </svg>
                    <span class="sidebar-footer-text">Collapse</span>
                </button>
            </div>
        </aside>

        <!-- Main Content -->
        <main id="mainContent" class="main-content">
            <!-- Top Bar -->
            <header class="topbar">
                <div class="topbar-left">
                    <button onclick="toggleMobile()" class="mobile-menu-btn">
                        <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M4 6h16M4 12h16M4 18h16" />
                        </svg>
                    </button>
                    <div>
                        <h2 id="pageTitle" class="topbar-title">Dashboard</h2>
                        <p id="pageSubtitle" class="topbar-subtitle">Welcome to LabDesk</p>
                    </div>
                </div>
                <div class="topbar-right">
                    <span id="labNameHeader" class="lab-name-badge hidden"></span>
                    <button onclick="showPage('newReport')" class="btn btn-primary btn-sm">
                        <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4" />
                        </svg>
                        <span class="hide-mobile">New Report</span>
                    </button>
                    <button onclick="handleLogout()" class="btn btn-outline btn-sm" title="Logout">
                        <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
                        </svg>
                        <span class="hide-mobile">Logout</span>
                    </button>
                </div>
            </header>

            <!-- Loading Overlay -->
            <div id="loadingOverlay" class="loading-overlay hidden">
                <div class="loader-spinner"></div>
                <p class="text-sm text-gray-500" style="margin-top:12px;">Loading...</p>
            </div>

            <!-- Page Container -->
            <div id="pageContainer" class="page-container fade-in"></div>
        </main>
    </div>

    <!-- Print Area -->
    <div id="printArea" class="hidden"></div>
    <!-- Modal Container -->
    <div id="modalContainer" class="hidden"></div>
    <!-- Toast Container -->
    <div id="toastContainer"></div>

    <!-- Firebase SDK v9 Compat (works like v8 but is v9) -->
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
