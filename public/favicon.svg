<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4f46e5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7c3aed;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background Circle -->
  <circle cx="256" cy="256" r="256" fill="url(#grad)"/>
  
  <!-- Test Tube Icon -->
  <g transform="translate(156, 96)">
    <!-- Flask/Test tube body -->
    <path d="M 120 50 L 120 200 Q 120 280 100 300 Q 80 320 100 340 Q 120 360 140 340 Q 160 320 140 300 Q 120 280 120 200 L 120 50 Z" 
          fill="white" opacity="0.95"/>
    
    <!-- Letter L integrated -->
    <rect x="90" y="80" width="30" height="200" fill="#4f46e5"/>
    <rect x="90" y="250" width="80" height="30" fill="#4f46e5"/>
    
    <!-- Liquid in tube -->
    <ellipse cx="120" cy="280" rx="18" ry="8" fill="#7c3aed" opacity="0.6"/>
  </g>
</svg>
